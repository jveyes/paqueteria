version: '3.8'

services:
  # =============================================================================
  # FASTAPI APPLICATION
  # =============================================================================
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paqueteria-fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://paqueteria_user:paqueteria_pass@mysql:3306/paqueteria
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      # Código fuente (solo para desarrollo)
      - ./src:/app/src:ro
      # Logs persistentes
      - paqueteria_logs:/app/logs
      # Archivos subidos por usuarios
      - paqueteria_uploads:/app/uploads
      # Configuración de la aplicación
      - paqueteria_config:/app/config
      # Certificados SSL
      - paqueteria_ssl:/app/ssl
    depends_on:
      - mysql
    networks:
      - paqueteria-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================================================
  # MYSQL DATABASE
  # =============================================================================
  mysql:
    image: mysql:8.0
    container_name: paqueteria-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_change_in_production
      MYSQL_DATABASE: paqueteria
      MYSQL_USER: paqueteria_user
      MYSQL_PASSWORD: paqueteria_pass
    ports:
      - "3306:3306"
    volumes:
      # Datos de la base de datos (CRÍTICO)
      - paqueteria_mysql_data:/var/lib/mysql
      # Logs de MySQL
      - paqueteria_mysql_logs:/var/log/mysql
      # Configuración de MySQL
      - paqueteria_mysql_config:/etc/mysql/conf.d
      # Scripts de inicialización
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - paqueteria-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================================================
  # NGINX REVERSE PROXY
  # =============================================================================
  nginx:
    image: nginx:1.24-alpine
    container_name: paqueteria-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Configuración de Nginx
      - paqueteria_nginx_config:/etc/nginx/conf.d
      - paqueteria_nginx_ssl:/etc/nginx/ssl
      # Logs de Nginx
      - paqueteria_nginx_logs:/var/log/nginx
      # Archivos estáticos
      - paqueteria_static:/var/www/static
      # Certificados SSL
      - paqueteria_ssl:/etc/nginx/ssl:ro
    depends_on:
      - fastapi
    networks:
      - paqueteria-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # ADMINER (Database Management)
  # =============================================================================
  adminer:
    image: adminer:4.8.1
    container_name: paqueteria-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql
    networks:
      - paqueteria-network

  # =============================================================================
  # REDIS (Cache and Session Storage)
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: paqueteria-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      # Datos de Redis (CRÍTICO)
      - paqueteria_redis_data:/data
      # Logs de Redis
      - paqueteria_redis_logs:/var/log/redis
      # Configuración de Redis
      - paqueteria_redis_config:/usr/local/etc/redis
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - paqueteria-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # CELERY WORKER (Background Tasks)
  # =============================================================================
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paqueteria-celery-worker
    restart: unless-stopped
    command: celery -A src.app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=mysql+pymysql://paqueteria_user:paqueteria_pass@mysql:3306/paqueteria
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      # Código fuente (solo para desarrollo)
      - ./src:/app/src:ro
      # Logs persistentes
      - paqueteria_logs:/app/logs
      # Archivos temporales de Celery
      - paqueteria_celery_temp:/app/temp
    depends_on:
      - mysql
      - redis
    networks:
      - paqueteria-network

  # =============================================================================
  # CELERY BEAT (Scheduled Tasks)
  # =============================================================================
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paqueteria-celery-beat
    restart: unless-stopped
    command: celery -A src.app.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=mysql+pymysql://paqueteria_user:paqueteria_pass@mysql:3306/paqueteria
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      # Código fuente (solo para desarrollo)
      - ./src:/app/src:ro
      # Logs persistentes
      - paqueteria_logs:/app/logs
      # Archivos temporales de Celery
      - paqueteria_celery_temp:/app/temp
    depends_on:
      - mysql
      - redis
    networks:
      - paqueteria-network

  # =============================================================================
  # FLOWER (Celery Monitoring)
  # =============================================================================
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paqueteria-flower
    restart: unless-stopped
    command: celery -A src.app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      # Logs de Flower
      - paqueteria_flower_logs:/app/logs
    depends_on:
      - redis
      - celery_worker
    networks:
      - paqueteria-network

  # =============================================================================
  # PROMETHEUS (Monitoring)
  # =============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: paqueteria-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      # Configuración de Prometheus
      - paqueteria_prometheus_config:/etc/prometheus
      # Datos de métricas (CRÍTICO)
      - paqueteria_prometheus_data:/prometheus
      # Logs de Prometheus
      - paqueteria_prometheus_logs:/var/log/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - paqueteria-network

  # =============================================================================
  # GRAFANA (Monitoring Dashboard)
  # =============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: paqueteria-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      # Datos de Grafana (CRÍTICO)
      - paqueteria_grafana_data:/var/lib/grafana
      # Configuración de Grafana
      - paqueteria_grafana_config:/etc/grafana/provisioning
      # Logs de Grafana
      - paqueteria_grafana_logs:/var/log/grafana
    depends_on:
      - prometheus
    networks:
      - paqueteria-network

  # =============================================================================
  # BACKUP SERVICE (Automated Backups)
  # =============================================================================
  backup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paqueteria-backup
    restart: "no"
    command: python -m src.app.services.backup_service
    environment:
      - DATABASE_URL=mysql+pymysql://paqueteria_user:paqueteria_pass@mysql:3306/paqueteria
      - BACKUP_ENABLED=True
    volumes:
      # Backups de la base de datos
      - paqueteria_backups:/app/backups
      # Logs de backup
      - paqueteria_logs:/app/logs
    depends_on:
      - mysql
    networks:
      - paqueteria-network
    profiles:
      - backup

# =============================================================================
# VOLUMES EXTERNOS (PERSISTENTES)
# =============================================================================
volumes:
  # Base de datos MySQL (CRÍTICO)
  paqueteria_mysql_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/mysql/data
  
  # Logs de MySQL
  paqueteria_mysql_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/mysql/logs
  
  # Configuración de MySQL
  paqueteria_mysql_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/mysql/config
  
  # Datos de Redis (CRÍTICO)
  paqueteria_redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/redis/data
  
  # Logs de Redis
  paqueteria_redis_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/redis/logs
  
  # Configuración de Redis
  paqueteria_redis_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/redis/config
  
  # Logs de la aplicación
  paqueteria_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/logs
  
  # Archivos subidos por usuarios (CRÍTICO)
  paqueteria_uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/uploads
  
  # Configuración de la aplicación
  paqueteria_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/config
  
  # Certificados SSL
  paqueteria_ssl:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/ssl
  
  # Configuración de Nginx
  paqueteria_nginx_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/nginx/config
  
  # Logs de Nginx
  paqueteria_nginx_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/nginx/logs
  
  # SSL de Nginx
  paqueteria_nginx_ssl:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/nginx/ssl
  
  # Archivos estáticos
  paqueteria_static:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/static
  
  # Archivos temporales de Celery
  paqueteria_celery_temp:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/celery/temp
  
  # Logs de Flower
  paqueteria_flower_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/flower/logs
  
  # Configuración de Prometheus
  paqueteria_prometheus_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/prometheus/config
  
  # Datos de Prometheus (CRÍTICO)
  paqueteria_prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/prometheus/data
  
  # Logs de Prometheus
  paqueteria_prometheus_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/prometheus/logs
  
  # Datos de Grafana (CRÍTICO)
  paqueteria_grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/grafana/data
  
  # Configuración de Grafana
  paqueteria_grafana_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/grafana/config
  
  # Logs de Grafana
  paqueteria_grafana_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/grafana/logs
  
  # Backups (CRÍTICO)
  paqueteria_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/backups

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  paqueteria-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
