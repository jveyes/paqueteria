<div class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
    <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
        <div class="mt-3 text-center">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100">
                <i class="fas fa-check text-green-600 text-xl"></i>
            </div>
            <h3 class="text-lg leading-6 font-medium text-gray-900 mt-4">¡Paquete Anunciado Exitosamente!</h3>
            <div class="mt-2 px-7 py-3">
                <p class="text-sm text-gray-500">
                    El paquete ha sido anunciado y el cliente recibirá una notificación SMS con el número de tracking.
                </p>
                <div class="mt-4 p-3 bg-gray-50 rounded-lg">
                    <p class="text-sm font-medium text-gray-700">Número de Tracking:</p>
                    <p class="text-lg font-bold text-blue-600">{{ tracking_number }}</p>
                    <p class="text-sm text-gray-600 mt-2">Cliente: {{ customer_name }}</p>
                    <p class="text-sm text-gray-600">Costo: {{ package_cost }}</p>
                </div>
            </div>
            <div class="items-center px-4 py-3">
                <button onclick="window.location.href='/receive'"
                        class="px-4 py-2 bg-blue-600 text-white text-base font-medium rounded-md w-full shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    Continuar
                </button>
            </div>
        </div>
    </div>
</div>
